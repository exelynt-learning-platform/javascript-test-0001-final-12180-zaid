<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function printDiamond() {
        let n = 5;
        for (let i = 1; i <= n; i++) {
          let line = "";
          for (let s = 0; s < n - i; s++) {
            line += " ";
          }
          line += "*";
          if (i > 1) {
            for (let m = 0; m < 2 * i - 3; m++) {
              line += " ";
            }
            line += "*";
          }

          console.log(line);
        }
        for (let i = n - 1; i >= 1; i--) {
          let line = "";
          for (let s = 0; s < n - i; s++) {
            line += " ";
          }

          line += "*";
          if (i > 1) {
            for (let m = 0; m < 2 * i - 3; m++) {
              line += " ";
            }
            line += "*";
          }

          console.log(line);
        }
      }
      printDiamond();
    </script>
  </body>
</html>
